。動画BGMの尺調整や、クライアントからの部分修正依頼に素早く対応できる。", "category": "音楽・音声", "excitement_level": 4, "availability": "無料枠あり", "url": "https://elevenlabs.io/blog/eleven-music-new-tools-for-exploring-editing-and-producing-music-with-ai", "source": "ElevenLabs", "date_added": "2026-03-27"}, {"title_ja": "Grok ImagineのExtend from Frameで動画シーンをシームレスに連結", "summary": "xAIのGrok Imagineに3月2日追加された新機能。生成した動画クリップの最終フレームから次のクリップを継続生成し、シームレスなシーケンスを構築。月10億本以上の動画を生成する規模に成長。", "how_to_use": "シーン1→シーン2→シーン3とクリップを連結して、ストーリー性のあるショート動画を構築。CMやプロモ動画のコンテ検証にも使える。", "category": "動画制作", "excitement_level": 4, "availability": "無料枠あり", "url": "https://www.basenor.com/blogs/news/grok-imagine-gets-a-major-update-whats-new-in-march-2026", "source": "Basenor", "date_added": "2026-03-27"}, {"title_ja": "Roland Melody Flipでプロ向けAI作曲コラボツールが登場", "summary": "Roland×ソニーCSLが3月18日発表。AIが「共同制作者」としてメロディを提案する作曲支援ツール。初心者向けの自動生成ではなく、プロの音楽プロデューサーが創作の起点として使う設計。5月に無料トライアル開始。", "how_to_use": "作曲時のアイデア出しやスランプ打破に。AIが提案するメロディをベースに自分でアレンジ。Roland Cloud Managerから利用。", "category": "音楽・音声", "excitement_level": 3, "availability": "ベータ版・順次公開", "url": "https://www.digitalmusicnews.com/2026/03/18/roland-ai-melody-generation/", "source": "Digital Music News", "date_added": "2026-03-27"}];
const COLORS = {"動画制作": "#FF6B35", "画像・デザイン": "#9B59B6", "音楽・音声": "#1DB954", "コーディング": "#0099FF", "ワークフロー自動化": "#F39C12", "マルチモーダル": "#E74C3C"};
const EMOJIS = {"動画制作": "🎬", "画像・デザイン": "🎨", "音楽・音声": "🎵", "コーディング": "💻", "ワークフロー自動化": "⚡", "マルチモーダル": "🚀"};
const AVAIL_INFO = {"無料で今すぐ": {"emoji": "🟢", "color": "#27AE60"}, "無料枠あり": {"emoji": "🟢", "color": "#27AE60"}, "要登録（無料）": {"emoji": "🔵", "color": "#3498DB"}, "有料（月額あり）": {"emoji": "🟡", "color": "#F39C12"}, "ベータ版・順次公開": {"emoji": "🟠", "color": "#E67E22"}, "開発者向け": {"emoji": "🔴", "color": "#E74C3C"}};

let activeCategory = null;
let currentTab = 'latest';

// 最新日付を特定
const allDates = ARTICLES.map(a => a.date_added || '').filter(d => d);
const LATEST_DATE = allDates.length ? [...new Set(allDates)].sort().reverse()[0] : '';
const LATEST_ITEMS = ARTICLES.filter(a => a.date_added === LATEST_DATE);
const PAST_ITEMS = ARTICLES.filter(a => a.date_added !== LATEST_DATE);

// タブカウント表示
document.getElementById('latestCount').textContent = LATEST_ITEMS.length + '件';
document.getElementById('archiveCount').textContent = ARTICLES.length + '件';

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function stars(n) {
  return '⭐'.repeat(n || 0);
}

function buildCard(a) {
  const cat = a.category || '';
  const color = COLORS[cat] || '#888';
  const emoji = EMOJIS[cat] || '📌';
  const avail = a.availability || '';
  const ai = AVAIL_INFO[avail] || { emoji: '', color: '#888' };
  const dateStr = a.date_added || '';

  return `<div class="card" style="border-left: 4px solid ${color};">
    <div class="card-header">
      <span>
        <span class="badge" style="background:${color}">${emoji} ${esc(cat)}</span>
        ${dateStr ? `<span class="date-badge">📅 ${esc(dateStr)}</span>` : ''}
      </span>
      <span class="stars">${stars(a.excitement_level)}</span>
    </div>
    <h2>${esc(a.title_ja || a.title)}</h2>
    <p class="summary">${esc(a.summary)}</p>
    <div class="how-to-use">
      <strong>💡 こう使える:</strong> ${esc(a.how_to_use)}
    </div>
    <div class="card-footer">
      <span class="avail" style="color:${ai.color}">${ai.emoji} ${esc(avail)}</span>
      <span class="link">🔗 <a href="${esc(a.url)}" target="_blank">${esc(a.source)}</a></span>
    </div>
  </div>`;
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabLatest').classList.toggle('active', tab === 'latest');
  document.getElementById('tabArchive').classList.toggle('active', tab === 'archive');
  document.getElementById('controls').classList.toggle('visible', tab === 'archive');
  document.getElementById('resultCount').style.display = tab === 'archive' ? '' : 'none';

  // 検索リセット
  if (tab === 'latest') {
    document.getElementById('searchInput').value = '';
    activeCategory = null;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    const allBtn = document.querySelector('.filter-btn[data-cat=""]');
    if (allBtn) allBtn.classList.add('active');
  }
  renderCards();
}

function renderCards() {
  const container = document.getElementById('cardContainer');

  if (currentTab === 'latest') {
    // 最新タブ：最新日付の記事だけ表示
    let html = '';
    LATEST_ITEMS.forEach(a => { html += buildCard(a); });
    container.innerHTML = html || '<p style="text-align:center;color:#484f58;padding:40px;">まだ記事がありません</p>';
    return;
  }

  // アーカイブタブ：全記事を検索・フィルタ
  const q = document.getElementById('searchInput').value.toLowerCase();
  let html = '';
  let count = 0;

  ARTICLES.forEach(a => {
    const cat = a.category || '';
    const searchText = [
      a.title_ja, a.title, a.summary, a.how_to_use
    ].join(' ').toLowerCase();

    const matchSearch = !q || searchText.includes(q);
    const matchCat = !activeCategory || cat === activeCategory;
    if (!matchSearch || !matchCat) return;

    count++;
    html += buildCard(a);
  });

  container.innerHTML = html || '<p style="text-align:center;color:#484f58;padding:40px;">見つかりませんでした</p>';
  document.getElementById('resultCount').textContent = `${count}件表示中（全${ARTICLES.length}件）`;
}

function renderFilters() {
  const cats = {};
  ARTICLES.forEach(a => {
    const c = a.category || '';
    cats[c] = (cats[c] || 0) + 1;
  });

  const el = document.getElementById('filterBtns');
  let html = `<button class="filter-btn active" data-cat="">すべて</button>`;
  Object.entries(cats)
    .sort((a, b) => b[1] - a[1])
    .forEach(([cat, n]) => {
      const emoji = EMOJIS[cat] || '';
      html += `<button class="filter-btn" data-cat="${esc(cat)}">${emoji} ${esc(cat)} (${n})</button>`;
    });
  el.innerHTML = html;

  el.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      el.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat || null;
      renderCards();
    });
  });
}

document.getElementById('searchInput').addEventListener('input', renderCards);
document.getElementById('resultCount').style.display = 'none';
renderFilters();
renderCards();
</script>
</body>
</html>
